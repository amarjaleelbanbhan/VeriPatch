name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write # OIDC trusted publishing to npm — no NPM_TOKEN secret required

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm run check
      - run: npm run build

      # If unreleased changesets exist on main, opens/updates a "Version
      # Packages" PR. If that PR was just merged (main already has the
      # version bump and no changesets left), publishes to npm instead.
      # Trusted Publishing (OIDC, configured on the npm package's Access
      # page) authenticates this step — no token, secret, or password ever
      # touches this workflow.
      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@06245a4e0a36c064a573d4150030f5ec548e4fcc # v1.4.9
        with:
          publish: npm run release:publish
          version: npm run release:version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: steps.changesets.outputs.published == 'true'
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.1
        with:
          tag_name: veripatch@${{ fromJson(steps.changesets.outputs.publishedPackages)[0].version }}
          body: See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          generate_release_notes: false
