name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: lint / typecheck / build / test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck
      - run: npm run build
      - run: npm run test:coverage
      # Dogfooding (blueprint T8.1): VeriPatch scanning its own dependency
      # tree, from source. Runs the CLI directly rather than via action.yml
      # since the action installs from the published npm package, which
      # doesn't exist until v0.1.0 ships — switch this to `uses: ./` once it
      # does. Non-blocking for now: a live OSV.dev call in CI shouldn't gate
      # unrelated PRs on a transient network blip while we build confidence.
      - name: Dogfood — scan VeriPatch's own dependencies
        if: matrix.os == 'ubuntu-latest'
        continue-on-error: true
        run: node dist/cli.js scan --no-color

  commitlint:
    name: conventional commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

# Docker-backed security e2e (tests/e2e/security) self-skips when no daemon is
# reachable, so no separate job is needed: it runs for real on ubuntu-latest
# (Docker pre-installed on GitHub-hosted runners) as part of `check` above,
# and is a no-op on macos-latest, matching the blueprint's "ubuntu full incl.
# Docker E2E, macos unit+integration" matrix intent without extra plumbing.
