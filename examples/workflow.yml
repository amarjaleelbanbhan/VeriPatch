# Example consumer workflow for the VeriPatch GitHub Action.
#
# Copy this into your own repo as .github/workflows/veripatch.yml and adjust
# severity-threshold / verify / triggers to taste.
name: VeriPatch

on:
  pull_request:
    paths:
      - 'package.json'
      - 'package-lock.json'
  schedule:
    # Weekly, independent of code changes — catches newly disclosed
    # advisories against dependencies that haven't changed (blueprint §7:
    # a push-only trigger would miss these).
    - cron: '0 6 * * 1'
  workflow_dispatch: {}

permissions:
  contents: read
  # Only needed for the sticky PR comment when verify: true.
  pull-requests: write

jobs:
  veripatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: amarjaleelbanbhan/VeriPatch@v0.1.0
        with:
          severity-threshold: high
          fail-on: new
          # Verifying needs Docker (present on ubuntu-latest) and adds several
          # minutes per vulnerability — enable once you're ready to act on
          # verified fixes automatically, not just be warned about them.
          verify: false

# First run: commit `.veripatch/baseline.json` (generated by a local
# `veripatch scan`) to accept pre-existing debt without failing this check —
# `fail-on: new` then only fires on vulnerabilities introduced afterward.
